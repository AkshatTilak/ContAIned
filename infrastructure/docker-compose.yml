services:
  # ──────────────────────────────────────────────
  # Infrastructure
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: akshat_platform
      POSTGRES_USER: akshat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akshat -d akshat_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes: ["qdrant_data:/qdrant/storage"]

  neo4j:
    image: neo4j:5.20.0
    ports:
      - "7474:7474" # HTTP port
      - "7687:7687" # Bolt port
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-changeme}", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ──────────────────────────────────────────────
  # Backend 1: API Gateway (CPU-only, lightweight)
  # ──────────────────────────────────────────────
  gateway:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.gateway
    ports: ["8000:8000"]
    env_file: ../.env
    environment:
      INFERENCE_SERVER_URL: http://inference:8010
      DATABASE_URL: postgresql+asyncpg://akshat:${POSTGRES_PASSWORD:-changeme}@postgres:5432/akshat_platform
      QDRANT_URL: http://qdrant:6333
      NEO4J_URL: bolt://neo4j:7687
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_healthy
    command: uvicorn gateway.main:app --host 0.0.0.0 --port 8000 --reload

  # ──────────────────────────────────────────────
  # Backend 2: Inference Server (GPU)
  # ──────────────────────────────────────────────
  inference:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.inference
    ports: ["8010:8010"]
    env_file: ../.env
    deploy:
      resources:
        resources:
          reservations:
            devices:
              - driver: nvidia
                count: 1
                capabilities: [gpu]
    command: uvicorn inference.main:app --host 0.0.0.0 --port 8010

  # ──────────────────────────────────────────────
  # Observability
  # ──────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector:latest
    ports: ["4317:4317", "4318:4318"]
    profiles: ["observability"]

  # ──────────────────────────────────────────────
  # Test Runner (on-demand)
  # ──────────────────────────────────────────────
  evalops-runner:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.gateway
    env_file: ../.env
    environment:
      GATEWAY_URL: http://gateway:8000
      INFERENCE_SERVER_URL: http://inference:8010
      DATABASE_URL: postgresql+asyncpg://akshat:${POSTGRES_PASSWORD:-changeme}@postgres:5432/akshat_platform
      QDRANT_URL: http://qdrant:6333
      NEO4J_URL: bolt://neo4j:7687
    depends_on: [gateway, inference, neo4j]
    profiles: ["test"]
    command: pytest projects/evalops/ -v

volumes:
  pgdata:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
