services:
  # ──────────────────────────────────────────────
  # Infrastructure
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: akshat_platform
      POSTGRES_USER: akshat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akshat -d akshat_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes: ["qdrant_data:/qdrant/storage"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/readyz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.20.0
    ports:
      - "7474:7474" # HTTP port
      - "7687:7687" # Bolt port
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-changeme}", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5

  kafka-setup:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ "sh", "-c" ]
    command: |
      "
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic syntraflow-ingestion-jobs --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic guardroute-traces --partitions 1 --replication-factor 1
      "

  # ──────────────────────────────────────────────
  # Backend 1: API Gateway (CPU-only, lightweight)
  # ──────────────────────────────────────────────
  gateway:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.gateway
    ports: ["8000:8000"]
    env_file: ../.env
    environment:
      INFERENCE_SERVER_URL: http://inference:8010
      DATABASE_URL: postgresql+asyncpg://akshat:${POSTGRES_PASSWORD:-changeme}@postgres:5432/akshat_platform
      QDRANT_URL: http://qdrant:6333
      NEO4J_URL: bolt://neo4j:7687
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn gateway.main:app --host 0.0.0.0 --port 8000 --reload

  # ──────────────────────────────────────────────
  # Backend 2: Inference Server (GPU)
  # ──────────────────────────────────────────────
  inference:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.inference
    ports: ["8010:8010"]
    env_file: ../.env
    volumes:
      - ../models:/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: uvicorn inference.main:app --host 0.0.0.0 --port 8010

  # ──────────────────────────────────────────────
  # Observability
  # ──────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector:latest
    ports: ["4317:4317", "4318:4318"]
    profiles: ["observability"]

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    profiles: ["observability"]

  # ──────────────────────────────────────────────
  # Admin tools
  # ──────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    ports: ["5050:80"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    profiles: ["admin"]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports: ["8080:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    profiles: ["admin"]
    depends_on:
      kafka:
        condition: service_healthy

  # ──────────────────────────────────────────────
  # Test Runner (on-demand)
  # ──────────────────────────────────────────────
  evalops-runner:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.gateway
    env_file: ../.env
    environment:
      GATEWAY_URL: http://gateway:8000
      INFERENCE_SERVER_URL: http://inference:8010
      DATABASE_URL: postgresql+asyncpg://akshat:${POSTGRES_PASSWORD:-changeme}@postgres:5432/akshat_platform
      QDRANT_URL: http://qdrant:6333
      NEO4J_URL: bolt://neo4j:7687
    depends_on: [gateway, inference, neo4j]
    profiles: ["test"]
    command: pytest projects/evalops/ -v

volumes:
  pgdata:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  kafka_data:
